# Deploy to ECS. Manual trigger; pick the environment via the name_prefix input
# (defaults to saalr-prod).
#
# Builds & pushes all seven images to ECR (<name_prefix>/<app>), then forces a new
# deployment of the ECS *services* (api + the long-running queue consumers). The
# scheduled / one-off images (ingest-worker, oms-worker, ml-worker, content-worker)
# are build+push only — they run as EventBridge task-defs / run-tasks, rolled by
# re-registering the task def (terraform apply with a new tag), not update-service.
#
# Prerequisites before this can run successfully:
#   1. terraform apply the target env (ECR repos, ECS cluster/services, OIDC deploy role).
#   2. Repo secret AWS_DEPLOY_ROLE_ARN = the env's gha_deploy_role_arn output.
#   3. The injected app secrets (saalr/app/*) hold real values, or ECS tasks won't start.
#
# To activate continuous deploy, add `push: { branches: [master] }` (it will use the
# default name_prefix).
name: Deploy to ECS

on:
  workflow_dispatch:
    inputs:
      name_prefix:
        description: "Environment resource prefix (saalr-prod or saalr-dev)."
        required: true
        default: saalr-prod

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ECS *services* — build, push, and force a new deployment.
          - { image: api, is_service: true }
          - { image: backtest-worker, is_service: true }
          - { image: research-agent, is_service: true }
          # Scheduled / one-off images — build + push only (rolled via terraform task-def re-register).
          - { image: ingest-worker, is_service: false }
          - { image: oms-worker, is_service: false }
          - { image: ml-worker, is_service: false }
          - { image: content-worker, is_service: false }
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          PREFIX: ${{ inputs.name_prefix }}
        run: |
          REPO="$REGISTRY/${PREFIX}/${{ matrix.image }}"
          docker build -t "$REPO:${{ github.sha }}" -t "$REPO:latest" -f "apps/${{ matrix.image }}/Dockerfile" .
          docker push "$REPO:${{ github.sha }}"
          docker push "$REPO:latest"

      - name: Force a new ECS deployment
        if: ${{ matrix.is_service }}
        env:
          PREFIX: ${{ inputs.name_prefix }}
        run: |
          aws ecs update-service \
            --cluster "${PREFIX}-cluster" \
            --service "${PREFIX}-${{ matrix.image }}" \
            --force-new-deployment
