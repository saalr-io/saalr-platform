# Deploy to ECS. Manual trigger; pick the environment via the name_prefix input
# (defaults to saalr-prod). Runs build -> migrate -> rollout in order so the DB
# schema is migrated before the new service code rolls out.
#
#   build:    build & push all seven images to ECR (<name_prefix>/<app>).
#   migrate:  run the <name_prefix>-migrate task (alembic upgrade head) and wait.
#   rollout:  force a new deployment of the ECS *services* (api + consumers).
#             Scheduled/one-off images (ingest/oms/ml/content) are build+push only;
#             they roll via terraform task-def re-register, so they're not here.
#
# Prerequisites before this can run successfully:
#   1. terraform apply the target env (ECR repos, ECS cluster/services, migrate task
#      def, OIDC deploy role).
#   2. Repo secret AWS_DEPLOY_ROLE_ARN = the env's gha_deploy_role_arn output.
#   3. The injected app secrets (saalr/app/*) hold real values, or ECS tasks won't start.
#
# To activate continuous deploy, add `push: { branches: [master] }` (uses the default prefix).
name: Deploy to ECS

on:
  workflow_dispatch:
    inputs:
      name_prefix:
        description: "Environment resource prefix (saalr-prod or saalr-dev)."
        required: true
        default: saalr-prod

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [api, backtest-worker, research-agent, ingest-worker, oms-worker, ml-worker, content-worker]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          PREFIX: ${{ inputs.name_prefix }}
        run: |
          REPO="$REGISTRY/${PREFIX}/${{ matrix.image }}"
          docker build -t "$REPO:${{ github.sha }}" -t "$REPO:latest" -f "apps/${{ matrix.image }}/Dockerfile" .
          docker push "$REPO:${{ github.sha }}"
          docker push "$REPO:latest"

  migrate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run alembic upgrade head (and wait)
        env:
          PREFIX: ${{ inputs.name_prefix }}
        run: |
          set -euo pipefail
          CL="${PREFIX}-cluster"
          # Reuse the api service's VPC config (private subnets + app SG) for the one-off task.
          NET=$(aws ecs describe-services --cluster "$CL" --services "${PREFIX}-api" \
            --query 'services[0].networkConfiguration' --output json)
          TASK=$(aws ecs run-task --cluster "$CL" --task-definition "${PREFIX}-migrate" \
            --launch-type FARGATE --network-configuration "$NET" \
            --query 'tasks[0].taskArn' --output text)
          echo "migrate task: $TASK"
          aws ecs wait tasks-stopped --cluster "$CL" --tasks "$TASK"
          CODE=$(aws ecs describe-tasks --cluster "$CL" --tasks "$TASK" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "migrate exit code: $CODE"
          test "$CODE" = "0"

  rollout:
    needs: migrate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, backtest-worker, research-agent]
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force a new ECS deployment
        env:
          PREFIX: ${{ inputs.name_prefix }}
        run: |
          aws ecs update-service \
            --cluster "${PREFIX}-cluster" \
            --service "${PREFIX}-${{ matrix.service }}" \
            --force-new-deployment
