# Deploy to ECS (AWS-2e). Manual trigger only until the stack is applied.
#
# Builds & pushes ALL seven images to ECR (saalr-dev/<app>), then forces a new deployment of the
# ECS *services* (api + the long-running queue consumers). The scheduled / one-off images
# (ingest-worker, oms-worker, ml-worker, content-worker) are build+push only — they run as
# EventBridge task-defs or manual run-tasks, so their image is rolled by re-registering the task
# def (terraform apply with a new tag), not `update-service`.
#
# Prerequisites before this can run successfully:
#   1. `terraform apply` the dev stack (creates the ECR repos, ECS cluster/services, and the
#      GitHub OIDC deploy role — see infra/terraform/environments/dev/outputs.tf gha_deploy_role_arn).
#   2. Set the repo secret AWS_DEPLOY_ROLE_ARN to that deploy-role ARN.
#
# To activate continuous deploy, replace `workflow_dispatch` with `push: { branches: [master] }`.
name: Deploy to ECS

on:
  workflow_dispatch: {}

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: saalr-dev-cluster

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ECS *services* — build, push, and force a new deployment.
          - { image: api, service: saalr-dev-api, dockerfile: apps/api/Dockerfile }
          - { image: backtest-worker, service: saalr-dev-backtest-worker, dockerfile: apps/backtest-worker/Dockerfile }
          - { image: research-agent, service: saalr-dev-research-agent, dockerfile: apps/research-agent/Dockerfile }
          # Scheduled / one-off images — build + push only (rolled via terraform task-def re-register).
          - { image: ingest-worker, service: "", dockerfile: apps/ingest-worker/Dockerfile }
          - { image: oms-worker, service: "", dockerfile: apps/oms-worker/Dockerfile }
          - { image: ml-worker, service: "", dockerfile: apps/ml-worker/Dockerfile }
          - { image: content-worker, service: "", dockerfile: apps/content-worker/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          REPO="$REGISTRY/saalr-dev/${{ matrix.image }}"
          docker build -t "$REPO:${{ github.sha }}" -t "$REPO:latest" -f "${{ matrix.dockerfile }}" .
          docker push "$REPO:${{ github.sha }}"
          docker push "$REPO:latest"

      - name: Force a new ECS deployment
        if: matrix.service != ''
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "${{ matrix.service }}" \
            --force-new-deployment

# NOTE: the scheduled / one-off images (ingest-worker, oms-worker, ml-worker, content-worker) are
# EventBridge tasks or manual run-tasks pinned to a task-definition revision, not ECS services — so
# they carry `service: ""` and skip `update-service`. Their image is rolled by re-registering the
# task def (terraform apply with a new image tag).
