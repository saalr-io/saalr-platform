[project]
name = "saalr-brokers"
version = "0.0.0"
requires-python = ">=3.12,<3.13"
dependencies = ["saalr-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["saalr_brokers"]

[tool.uv.sources]
saalr-core = { workspace = true }
