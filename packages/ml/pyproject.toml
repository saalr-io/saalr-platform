[project]
name = "saalr-ml"
version = "0.0.0"
requires-python = ">=3.12,<3.13"
dependencies = [
  "saalr-core",
  "numpy>=1.26",
  "scipy>=1.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["saalr_ml"]

[tool.uv.sources]
saalr-core = { workspace = true }
