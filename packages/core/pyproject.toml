[project]
name = "saalr-core"
version = "0.0.0"
requires-python = ">=3.12,<3.13"
dependencies = [
  "sqlalchemy[asyncio]>=2.0.30",
  "asyncpg>=0.29",
  "pydantic-settings>=2.2",
  "uuid-utils>=0.9",
  "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["saalr_core"]
